name: AdrianOS CI

on:
  pull_request:
    paths:
      - "adrianos-play-starter/**"
      - ".github/workflows/adrianos-ci.yml"
  push:
    branches:
      - main
    paths:
      - "adrianos-play-starter/**"
      - ".github/workflows/adrianos-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adrianos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-coverage:
    name: Unit tests and coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: adrianos-play-starter

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run unit tests with native coverage
        run: npm run test:coverage

      - name: Upload unit coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adrianos-unit-coverage
          path: adrianos-play-starter/coverage
          if-no-files-found: error
          retention-days: 30

  build-and-browser-checks:
    name: Production build and Playwright matrix
    needs: unit-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: adrianos-play-starter

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run production build and static contracts
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run full AdrianOS browser regression matrix
        run: npm run test:games

      - name: Upload browser QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adrianos-browser-report
          path: |
            adrianos-play-starter/playwright-report
            adrianos-play-starter/test-results
          if-no-files-found: ignore
          retention-days: 14
