name: AdrianOS CI

on:
  pull_request:
    paths:
      - "adrianos-play-starter/**"
      - ".github/workflows/adrianos-ci.yml"
  push:
    branches:
      - main
    paths:
      - "adrianos-play-starter/**"
      - ".github/workflows/adrianos-ci.yml"

permissions:
  contents: read

concurrency:
  group: adrianos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-mission-control:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: adrianos-play-starter

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: adrianos-play-starter/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run production build and static contracts
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Mission Control browser tests
        run: npx playwright test tests/e2e/daily-mission-control.spec.ts
