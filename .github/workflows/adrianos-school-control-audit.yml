name: Harden AdrianOS School Controls

on:
  push:
    branches: [agent/school-mode-fixed-control-qa]
    paths: [.github/workflows/adrianos-school-control-audit.yml]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message != 'Harden School Mode fixed controls'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/school-mode-fixed-control-qa
      - name: Apply shared School Mode control clearance
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          root = Path('adrianos-play-starter')

          bar_path = root / 'components' / 'DailySessionBar.tsx'
          bar = bar_path.read_text()
          replacements = [
              (
                  '    if (!profile || !Number.isInteger(index) || index < 0) return;\n    setProfileId(profile);',
                  '    if (!profile || !Number.isInteger(index) || index < 0) return;\n    document.documentElement.dataset.schoolMissionActive = "true";\n    setProfileId(profile);'
              ),
              (
                  '    return () => {\n      window.removeEventListener(DAILY_SESSION_EVENT, refresh);\n      window.removeEventListener("adrianos-learning-updated", refresh);\n    };',
                  '    return () => {\n      delete document.documentElement.dataset.schoolMissionActive;\n      window.removeEventListener(DAILY_SESSION_EVENT, refresh);\n      window.removeEventListener("adrianos-learning-updated", refresh);\n    };'
              ),
              (
                  '    <aside style={shell} aria-label="Daily session controls">',
                  '    <aside className="daily-session-bar" style={shell} aria-label="Daily session controls" role="status" aria-live="polite">'
              ),
              (
                  '      <div style={body}>',
                  '      <div className="daily-session-bar-body" style={body}>'
              ),
              (
                  '          <span style={status}>{instruction}</span>',
                  '          <span className="daily-session-bar-status" style={status}>{instruction}</span>'
              ),
              (
                  '        <button onClick={() => { window.location.href = "/daily-session?school=1"; }} style={pauseButton} type="button">',
                  '        <button className="daily-session-bar-pause" onClick={() => { window.location.href = "/daily-session?school=1"; }} style={pauseButton} type="button" aria-label="Pause School Mode and return to today’s route">'
              ),
              (
                  'const shell: React.CSSProperties = { position: "fixed", left: "50%", bottom: 14,',
                  'const shell: React.CSSProperties = { position: "fixed", left: "50%", bottom: "max(10px, env(safe-area-inset-bottom))",'
              ),
          ]
          for old, new in replacements:
              if old not in bar:
                  raise SystemExit(f'DailySessionBar patch point missing: {old[:70]}')
              bar = bar.replace(old, new, 1)
          bar_path.write_text(bar)

          layout_path = root / 'app' / 'layout.tsx'
          layout = layout_path.read_text()
          old_import = 'import "./guess-who-school-mode.css";'
          if old_import not in layout:
              raise SystemExit('Old Guess Who compatibility import missing')
          layout_path.write_text(layout.replace(old_import, 'import "./school-mode-controls.css";', 1))

          guess_path = root / 'app' / 'games' / 'guess-who' / 'guess-who.module.css'
          guess = guess_path.read_text()
          old_margin = '  margin: 18px 0 94px;'
          new_margin = '  margin: 18px 0 calc(94px + var(--school-mode-ribbon-clearance, 0px));'
          if old_margin not in guess:
              raise SystemExit('Guess Who content clearance patch point missing')
          guess = guess.replace(old_margin, new_margin, 1)
          old_bottom = '  left: 50%;\n  bottom: 14px;\n  display: flex;'
          new_bottom = '  left: 50%;\n  bottom: calc(14px + var(--school-mode-ribbon-clearance, 0px));\n  display: flex;'
          if old_bottom not in guess:
              raise SystemExit('Guess Who bottom bar patch point missing')
          guess = guess.replace(old_bottom, new_bottom, 1)
          guess_path.write_text(guess)

          shared_css = '''/* Shared clearance for guided School Mode controls.
   Game-level fixed bottom controls should add this variable to their normal offset. */
:root {
  --school-mode-ribbon-clearance: 0px;
}

html[data-school-mission-active="true"] {
  --school-mode-ribbon-clearance: calc(104px + env(safe-area-inset-bottom));
  scroll-padding-bottom: var(--school-mode-ribbon-clearance);
}

.game-stage {
  transition: padding-bottom 180ms ease;
}

html[data-school-mission-active="true"] .game-stage {
  padding-bottom: calc(clamp(18px, 4vw, 48px) + var(--school-mode-ribbon-clearance));
}

.daily-session-bar {
  bottom: max(10px, env(safe-area-inset-bottom)) !important;
}

@media (max-width: 570px) {
  html[data-school-mission-active="true"] {
    --school-mode-ribbon-clearance: calc(96px + env(safe-area-inset-bottom));
  }

  .daily-session-bar {
    width: calc(100vw - 16px) !important;
    border-radius: 18px !important;
  }

  .daily-session-bar-body {
    grid-template-columns: 34px minmax(0, 1fr) auto !important;
    gap: 8px !important;
    padding: 10px !important;
  }

  .daily-session-bar-status {
    display: none !important;
  }

  .daily-session-bar-pause {
    padding: 8px 10px !important;
  }
}

@media (prefers-reduced-motion: reduce) {
  .game-stage {
    transition: none;
  }
}
'''
          (root / 'app' / 'school-mode-controls.css').write_text(shared_css)

          checker = '''import { promises as fs } from "node:fs";
import path from "node:path";

const root = process.cwd();
const gamesDir = path.join(root, "app", "games");
const sourceExtensions = new Set([".css", ".ts", ".tsx"]);

async function walk(directory) {
  const entries = await fs.readdir(directory, { withFileTypes: true });
  const files = [];
  for (const entry of entries) {
    const fullPath = path.join(directory, entry.name);
    if (entry.isDirectory()) files.push(...await walk(fullPath));
    else if (sourceExtensions.has(path.extname(entry.name))) files.push(fullPath);
  }
  return files;
}

function relative(file) {
  return path.relative(root, file).split(path.sep).join("/");
}

async function main() {
  const files = await walk(gamesDir);
  const failures = [];

  for (const file of files) {
    const text = await fs.readFile(file, "utf8");
    if (file.endsWith(".css")) {
      const blocks = text.matchAll(/([^{}]+)\\{([^{}]*)\\}/g);
      for (const match of blocks) {
        const selector = match[1].trim().replace(/\\s+/g, " ");
        const declarations = match[2];
        const isFixedBottomControl = /position\\s*:\\s*fixed/i.test(declarations) && /bottom\\s*:/i.test(declarations);
        if (isFixedBottomControl && !/--school-mode-ribbon-clearance/.test(declarations)) {
          failures.push(`${relative(file)}: ${selector}`);
        }
      }
      continue;
    }

    const fixedObject = /position\\s*:\\s*["']fixed["']/g;
    for (const match of text.matchAll(fixedObject)) {
      const start = Math.max(0, match.index - 250);
      const end = Math.min(text.length, match.index + 650);
      const nearby = text.slice(start, end);
      if (/bottom\\s*:/.test(nearby) && !/--school-mode-ribbon-clearance/.test(nearby)) {
        failures.push(`${relative(file)}: inline fixed bottom control near character ${match.index}`);
      }
    }
  }

  if (failures.length) {
    console.error("Game controls can overlap the School Mode mission ribbon:");
    for (const failure of failures) console.error(`- ${failure}`);
    console.error("Add var(--school-mode-ribbon-clearance, 0px) to the control's normal bottom offset.");
    process.exit(1);
  }

  console.log(`School Mode control audit passed across ${files.length} game source files.`);
}

main().catch((error) => {
  console.error(error);
  process.exit(1);
});
'''
          (root / 'scripts' / 'check-school-mode-controls.mjs').write_text(checker)

          package_path = root / 'package.json'
          package = json.loads(package_path.read_text())
          package['scripts']['check:school-controls'] = 'node scripts/check-school-mode-controls.mjs'
          package['scripts']['build'] = 'npm run generate:games && npm run check:school-controls && next build'
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          old_css = root / 'app' / 'guess-who-school-mode.css'
          if old_css.exists():
              old_css.unlink()
          report = Path('qa-school-audit-report.txt')
          if report.exists():
              report.unlink()
          PY
      - name: Commit production fix and remove temporary audit scaffolding
        run: |
          git config user.name "AdrianOS QA Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git rm -f .github/workflows/adrianos-school-control-audit.yml
          git commit -m "Harden School Mode fixed controls"
          git push origin HEAD:agent/school-mode-fixed-control-qa
