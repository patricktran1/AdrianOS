name: AdrianOS School Control Audit

on:
  push:
    branches: [agent/school-mode-fixed-control-qa]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.head.ref }}
      - name: Audit fixed controls and completion paths
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('adrianos-play-starter')
          games = root / 'app' / 'games'
          output = []
          output.append('=== GAME DIRECTORIES ===')
          directories = sorted(p for p in games.iterdir() if p.is_dir())
          for directory in directories:
              output.append(str(directory.relative_to(root)))

          output.append('\n=== FIXED OR STICKY CONTROL CANDIDATES ===')
          candidates = []
          for path in sorted(games.rglob('*')):
              if path.suffix not in {'.tsx', '.ts', '.css'}:
                  continue
              text = path.read_text(errors='ignore')
              lines = text.splitlines()
              for index, line in enumerate(lines, 1):
                  if re.search(r'position\s*:\s*["\']?(fixed|sticky)', line, re.I) or re.search(r'position\s*:\s*(fixed|sticky)', line, re.I):
                      start = max(0, index - 4)
                      end = min(len(lines), index + 8)
                      snippet = '\n'.join(f'{n+1}: {lines[n]}' for n in range(start, end))
                      candidates.append((str(path.relative_to(root)), index, snippet))
          if not candidates:
              output.append('No game-level fixed or sticky controls found.')
          for path, line, snippet in candidates:
              output.append(f'\n--- {path}:{line} ---\n{snippet}')

          output.append('\n=== COMPLETION SIGNAL AUDIT ===')
          for directory in directories:
              source = '\n'.join(
                  p.read_text(errors='ignore')
                  for p in directory.rglob('*')
                  if p.suffix in {'.tsx', '.ts'}
              )
              has_metadata = (directory / 'game.json').exists()
              signals = []
              for label, pattern in [
                  ('award completed', r'completed\s*:\s*true'),
                  ('award call', r'\baward\s*\('),
                  ('record completion', r'complete|completed|finish|finished|win|won'),
                  ('game frame', r'<GameFrame'),
              ]:
                  if re.search(pattern, source, re.I):
                      signals.append(label)
              output.append(f'{directory.name}: metadata={has_metadata}; signals={", ".join(signals) if signals else "NONE"}')

          report = '\n'.join(output) + '\n'
          print(report)
          Path('qa-school-audit-report.txt').write_text(report)
          PY
      - name: Save audit report on audit branch
        if: github.event_name == 'push' && github.event.head_commit.message != 'Save School Mode audit report'
        run: |
          git config user.name "AdrianOS QA Bot"
          git config user.email "actions@users.noreply.github.com"
          git add qa-school-audit-report.txt
          git commit -m "Save School Mode audit report"
          git push origin HEAD:${{ github.ref_name }}
