name: Harden AdrianOS School Controls

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/school-mode-fixed-control-qa'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/school-mode-fixed-control-qa
      - name: Apply shared School Mode control clearance
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          root = Path('adrianos-play-starter')

          bar_path = root / 'components' / 'DailySessionBar.tsx'
          bar = bar_path.read_text()
          replacements = [
              ('    if (!profile || !Number.isInteger(index) || index < 0) return;\n    setProfileId(profile);', '    if (!profile || !Number.isInteger(index) || index < 0) return;\n    document.documentElement.dataset.schoolMissionActive = "true";\n    setProfileId(profile);'),
              ('    return () => {\n      window.removeEventListener(DAILY_SESSION_EVENT, refresh);\n      window.removeEventListener("adrianos-learning-updated", refresh);\n    };', '    return () => {\n      delete document.documentElement.dataset.schoolMissionActive;\n      window.removeEventListener(DAILY_SESSION_EVENT, refresh);\n      window.removeEventListener("adrianos-learning-updated", refresh);\n    };'),
              ('    <aside style={shell} aria-label="Daily session controls">', '    <aside className="daily-session-bar" style={shell} aria-label="Daily session controls" role="status" aria-live="polite">'),
              ('      <div style={body}>', '      <div className="daily-session-bar-body" style={body}>'),
              ('          <span style={status}>{instruction}</span>', '          <span className="daily-session-bar-status" style={status}>{instruction}</span>'),
              ('        <button onClick={() => { window.location.href = "/daily-session?school=1"; }} style={pauseButton} type="button">', '        <button className="daily-session-bar-pause" onClick={() => { window.location.href = "/daily-session?school=1"; }} style={pauseButton} type="button" aria-label="Pause School Mode and return to today’s route">'),
              ('const shell: React.CSSProperties = { position: "fixed", left: "50%", bottom: 14,', 'const shell: React.CSSProperties = { position: "fixed", left: "50%", bottom: "max(10px, env(safe-area-inset-bottom))",'),
          ]
          for old, new in replacements:
              if old not in bar:
                  raise SystemExit(f'DailySessionBar patch point missing: {old[:60]}')
              bar = bar.replace(old, new, 1)
          bar_path.write_text(bar)

          layout_path = root / 'app' / 'layout.tsx'
          layout = layout_path.read_text()
          if 'import "./guess-who-school-mode.css";' not in layout:
              raise SystemExit('Old Guess Who compatibility import missing')
          layout_path.write_text(layout.replace('import "./guess-who-school-mode.css";', 'import "./school-mode-controls.css";', 1))

          guess_path = root / 'app' / 'games' / 'guess-who' / 'guess-who.module.css'
          guess = guess_path.read_text()
          replacements = [
              ('  margin: 18px 0 94px;', '  margin: 18px 0 calc(94px + var(--school-mode-ribbon-clearance, 0px));'),
              ('  left: 50%;\n  bottom: 14px;\n  display: flex;', '  left: 50%;\n  bottom: calc(14px + var(--school-mode-ribbon-clearance, 0px));\n  display: flex;'),
          ]
          for old, new in replacements:
              if old not in guess:
                  raise SystemExit(f'Guess Who patch point missing: {old}')
              guess = guess.replace(old, new, 1)
          guess_path.write_text(guess)

          (root / 'app' / 'school-mode-controls.css').write_text('''/* Shared clearance for guided School Mode controls.\n   Game-level fixed bottom controls should add this variable to their normal offset. */\n:root {\n  --school-mode-ribbon-clearance: 0px;\n}\n\nhtml[data-school-mission-active="true"] {\n  --school-mode-ribbon-clearance: calc(104px + env(safe-area-inset-bottom));\n  scroll-padding-bottom: var(--school-mode-ribbon-clearance);\n}\n\n.game-stage {\n  transition: padding-bottom 180ms ease;\n}\n\nhtml[data-school-mission-active="true"] .game-stage {\n  padding-bottom: calc(clamp(18px, 4vw, 48px) + var(--school-mode-ribbon-clearance));\n}\n\n.daily-session-bar {\n  bottom: max(10px, env(safe-area-inset-bottom)) !important;\n}\n\n@media (max-width: 570px) {\n  html[data-school-mission-active="true"] {\n    --school-mode-ribbon-clearance: calc(96px + env(safe-area-inset-bottom));\n  }\n\n  .daily-session-bar {\n    width: calc(100vw - 16px) !important;\n    border-radius: 18px !important;\n  }\n\n  .daily-session-bar-body {\n    grid-template-columns: 34px minmax(0, 1fr) auto !important;\n    gap: 8px !important;\n    padding: 10px !important;\n  }\n\n  .daily-session-bar-status {\n    display: none !important;\n  }\n\n  .daily-session-bar-pause {\n    padding: 8px 10px !important;\n  }\n}\n\n@media (prefers-reduced-motion: reduce) {\n  .game-stage { transition: none; }\n}\n''')

          (root / 'scripts' / 'check-school-mode-controls.mjs').write_text('''import { promises as fs } from "node:fs";\nimport path from "node:path";\n\nconst root = process.cwd();\nconst gamesDir = path.join(root, "app", "games");\nconst extensions = new Set([".css", ".ts", ".tsx"]);\n\nasync function walk(directory) {\n  const entries = await fs.readdir(directory, { withFileTypes: true });\n  const files = [];\n  for (const entry of entries) {\n    const fullPath = path.join(directory, entry.name);\n    if (entry.isDirectory()) files.push(...await walk(fullPath));\n    else if (extensions.has(path.extname(entry.name))) files.push(fullPath);\n  }\n  return files;\n}\n\nconst relative = (file) => path.relative(root, file).split(path.sep).join("/");\n\nasync function main() {\n  const files = await walk(gamesDir);\n  const failures = [];\n\n  for (const file of files) {\n    const text = await fs.readFile(file, "utf8");\n    if (file.endsWith(".css")) {\n      for (const match of text.matchAll(/([^{}]+)\\{([^{}]*)\\}/g)) {\n        const selector = match[1].trim().replace(/\\s+/g, " ");\n        const declarations = match[2];\n        const fixedBottom = /position\\s*:\\s*fixed/i.test(declarations) && /bottom\\s*:/i.test(declarations);\n        if (fixedBottom && !/--school-mode-ribbon-clearance/.test(declarations)) failures.push(`${relative(file)}: ${selector}`);\n      }\n      continue;\n    }\n\n    for (const match of text.matchAll(/position\\s*:\\s*["']fixed["']/g)) {\n      const nearby = text.slice(Math.max(0, match.index - 250), Math.min(text.length, match.index + 650));\n      if (/bottom\\s*:/.test(nearby) && !/--school-mode-ribbon-clearance/.test(nearby)) failures.push(`${relative(file)}: inline fixed bottom control near character ${match.index}`);\n    }\n  }\n\n  if (failures.length) {\n    console.error("Game controls can overlap the School Mode mission ribbon:");\n    for (const failure of failures) console.error(`- ${failure}`);\n    console.error("Add var(--school-mode-ribbon-clearance, 0px) to the control's normal bottom offset.");\n    process.exit(1);\n  }\n\n  console.log(`School Mode control audit passed across ${files.length} game source files.`);\n}\n\nmain().catch((error) => { console.error(error); process.exit(1); });\n''')

          package_path = root / 'package.json'
          package = json.loads(package_path.read_text())
          package['scripts']['check:school-controls'] = 'node scripts/check-school-mode-controls.mjs'
          package['scripts']['build'] = 'npm run generate:games && npm run check:school-controls && next build'
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          for temporary in [root / 'app' / 'guess-who-school-mode.css', Path('qa-school-audit-report.txt')]:
              if temporary.exists(): temporary.unlink()
          PY
      - name: Commit production fix and remove temporary audit scaffolding
        run: |
          git config user.name "AdrianOS QA Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git rm -f .github/workflows/adrianos-school-control-audit.yml
          git commit -m "Harden School Mode fixed controls"
          git push origin HEAD:agent/school-mode-fixed-control-qa
