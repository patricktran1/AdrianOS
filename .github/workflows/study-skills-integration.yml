name: Study Skills Integration Patch

on:
  push:
    branches: [feature/study-skills-lab]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Integrate Study Skills across AdrianOS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/study-skills-lab
      - name: Wire skills and portfolio
        run: |
          python - <<'PY'
          from pathlib import Path

          skills = Path('adrianos-play-starter/lib/adrian-skill-graph.ts')
          text = skills.read_text()
          nodes = '''  {
              id: "study-planning",
              label: "Planning and starting work",
              subject: "Learning Skills",
              description: "Break work into a clear first step, plan backward from deadlines, and spread practice over time.",
              prerequisites: [],
              gameSlug: "study-skills-lab",
              minAge: 5,
              order: 1,
              evidenceSkillIds: ["study-planning"],
            },
            {
              id: "study-notes",
              label: "Useful notes and organization",
              subject: "Learning Skills",
              description: "Capture key ideas, organize topics, and create notes that can become self-tests.",
              prerequisites: [],
              gameSlug: "study-skills-lab",
              minAge: 5,
              order: 2,
              evidenceSkillIds: ["study-notes"],
            },
            {
              id: "study-retrieval",
              label: "Remembering through retrieval",
              subject: "Learning Skills",
              description: "Use recall, teach-back, spacing, and mixed practice instead of relying only on rereading.",
              prerequisites: ["study-planning"],
              gameSlug: "study-skills-lab",
              minAge: 5,
              order: 3,
              evidenceSkillIds: ["study-retrieval"],
            },
            {
              id: "study-questions",
              label: "Questions and checking understanding",
              subject: "Learning Skills",
              description: "Ask specific questions, summarize without looking, and compare confidence with evidence.",
              prerequisites: [],
              gameSlug: "study-skills-lab",
              minAge: 5,
              order: 4,
              evidenceSkillIds: ["study-questions"],
            },
            {
              id: "study-feedback",
              label: "Using feedback and revising",
              subject: "Learning Skills",
              description: "Find patterns in mistakes, apply feedback, verify the revision, and carry the lesson into future work.",
              prerequisites: ["study-questions"],
              gameSlug: "study-skills-lab",
              minAge: 6,
              order: 5,
              evidenceSkillIds: ["study-feedback"],
            },
          '''
          marker = '  {\n    id: "coding-sequences",'
          if 'id: "study-planning"' not in text:
              text = text.replace(marker, nodes + marker, 1)
          route = '''  if (node.gameSlug === "study-skills-lab") {
              const level = node.id === "study-planning" || node.id === "study-notes"
                ? "Learning Starter"
                : node.id === "study-feedback"
                  ? "Learning Strategist"
                  : "Study Builder";
              params.set("level", level);
              params.set("focus", node.id);
            }
          '''
          route_marker = '  if (node.gameSlug === "nature-environment-lab") {'
          if 'node.gameSlug === "study-skills-lab"' not in text:
              text = text.replace(route_marker, route + route_marker, 1)
          skills.write_text(text)

          portfolio = Path('adrianos-play-starter/lib/adrian-portfolio.ts')
          text = portfolio.read_text()
          if 'from "@/lib/adrian-study-toolkit"' not in text:
              text = text.replace(
                  'import { readEnvironmentToolkit, type EnvironmentToolkit } from "@/lib/adrian-environment-toolkit";',
                  'import { readEnvironmentToolkit, type EnvironmentToolkit } from "@/lib/adrian-environment-toolkit";\nimport { readStudyToolkit, type StudyToolkit } from "@/lib/adrian-study-toolkit";',
                  1,
              )
          text = text.replace(
              '  lifeSkillsToolkit: LifeSkillsToolkit,\n  environmentToolkit: EnvironmentToolkit\n): PortfolioHighlight[] {',
              '  lifeSkillsToolkit: LifeSkillsToolkit,\n  environmentToolkit: EnvironmentToolkit,\n  studyToolkit: StudyToolkit\n): PortfolioHighlight[] {',
              1,
          )
          block = '''  if (studyToolkit.tools.length > 0) {
              const latest = studyToolkit.tools[studyToolkit.tools.length - 1];
              addHighlight(highlights, {
                id: "study-skills-toolkit",
                kind: "achievement",
                emoji: "🧠",
                title: "Study Skills Toolkit",
                detail: `${studyToolkit.tools.length} learning tool${studyToolkit.tools.length === 1 ? "" : "s"} earned across ${studyToolkit.missions} study mission${studyToolkit.missions === 1 ? "" : "s"}. Recent tools: ${studyToolkit.tools.slice(-4).map((tool) => tool.label).join(", ")}.`,
                date: latest?.earnedAt ?? studyToolkit.updatedAt,
                subject: "Learning Skills",
                value: `${studyToolkit.tools.length} TOOLS`,
              });
            }

          '''
          marker2 = '  if (environmentToolkit.cards.length > 0) {'
          if 'id: "study-skills-toolkit"' not in text:
              text = text.replace(marker2, block + marker2, 1)
          text = text.replace(
              '  const environmentToolkit = readEnvironmentToolkit(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger, wellbeingToolkit, healthToolkit, digitalToolkit, musicToolkit, artToolkit, engineeringToolkit, movementToolkit, lifeSkillsToolkit, environmentToolkit);',
              '  const environmentToolkit = readEnvironmentToolkit(profile.id);\n  const studyToolkit = readStudyToolkit(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger, wellbeingToolkit, healthToolkit, digitalToolkit, musicToolkit, artToolkit, engineeringToolkit, movementToolkit, lifeSkillsToolkit, environmentToolkit, studyToolkit);',
              1,
          )
          text = text.replace(
              '  const environmentSubjects = environmentToolkit.cards.length > 0 ? ["Environment" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects, ...wellbeingSubjects, ...healthSubjects, ...digitalSubjects, ...musicSubjects, ...artSubjects, ...engineeringSubjects, ...movementSubjects, ...lifeSkillsSubjects, ...environmentSubjects]).size;',
              '  const environmentSubjects = environmentToolkit.cards.length > 0 ? ["Environment" as const] : [];\n  const studySubjects = studyToolkit.tools.length > 0 ? ["Learning Skills" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects, ...wellbeingSubjects, ...healthSubjects, ...digitalSubjects, ...musicSubjects, ...artSubjects, ...engineeringSubjects, ...movementSubjects, ...lifeSkillsSubjects, ...environmentSubjects, ...studySubjects]).size;',
              1,
          )
          portfolio.write_text(text)
          PY
      - name: Commit integration
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/lib/adrian-skill-graph.ts adrianos-play-starter/lib/adrian-portfolio.ts
          if ! git diff --cached --quiet; then
            git commit -m "Integrate Study Skills across AdrianOS"
            git push origin HEAD:feature/study-skills-lab
          fi
