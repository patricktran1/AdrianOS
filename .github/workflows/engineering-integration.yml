name: Engineering Integration Patch

on:
  push:
    branches: [feature/engineering-lab]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Integrate Engineering across AdrianOS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/engineering-lab
      - name: Wire Engineering skills and portfolio
        run: |
          python - <<'PY'
          from pathlib import Path

          skills = Path('adrianos-play-starter/lib/adrian-skill-graph.ts')
          text = skills.read_text()
          nodes = '''  {
              id: "engineering-structures",
              label: "Structures and stability",
              subject: "Engineering",
              description: "Trace load paths, use stable shapes, and design structures that resist tipping or collapse.",
              prerequisites: [],
              gameSlug: "engineering-lab",
              minAge: 4,
              order: 1,
              evidenceSkillIds: ["engineering-structures"],
            },
            {
              id: "engineering-forces",
              label: "Forces and motion",
              subject: "Engineering",
              description: "Reason about pushes, pulls, friction, compression, motion, and performance trade-offs.",
              prerequisites: [],
              gameSlug: "engineering-lab",
              minAge: 4,
              order: 2,
              evidenceSkillIds: ["engineering-forces"],
            },
            {
              id: "engineering-materials",
              label: "Materials and properties",
              subject: "Engineering",
              description: "Match materials to design needs using strength, flexibility, transparency, impact absorption, and other properties.",
              prerequisites: [],
              gameSlug: "engineering-lab",
              minAge: 4,
              order: 3,
              evidenceSkillIds: ["engineering-materials"],
            },
            {
              id: "engineering-mechanisms",
              label: "Mechanisms and simple machines",
              subject: "Engineering",
              description: "Use wheels, levers, ramps, gears, and feedback systems to change force or motion.",
              prerequisites: ["engineering-forces"],
              gameSlug: "engineering-lab",
              minAge: 5,
              order: 4,
              evidenceSkillIds: ["engineering-mechanisms"],
            },
            {
              id: "engineering-iteration",
              label: "Testing and iteration",
              subject: "Engineering",
              description: "Use failures as evidence, change one variable at a time, define constraints, and target redesigns.",
              prerequisites: ["engineering-structures", "engineering-materials"],
              gameSlug: "engineering-lab",
              minAge: 5,
              order: 5,
              evidenceSkillIds: ["engineering-iteration"],
            },
          '''
          marker = '  {\n    id: "coding-sequences",'
          if 'id: "engineering-structures"' not in text:
              text = text.replace(marker, nodes + marker, 1)
          route = '''  if (node.gameSlug === "engineering-lab") {
              const level = node.id === "engineering-structures" || node.id === "engineering-materials"
                ? "Builder"
                : node.id === "engineering-iteration"
                  ? "Systems Thinker"
                  : "Inventor";
              params.set("level", level);
              params.set("focus", node.id);
            }
          '''
          route_marker = '  if (node.gameSlug === "art-design-lab") {'
          if 'node.gameSlug === "engineering-lab"' not in text:
              text = text.replace(route_marker, route + route_marker, 1)
          skills.write_text(text)

          portfolio = Path('adrianos-play-starter/lib/adrian-portfolio.ts')
          text = portfolio.read_text()
          if 'from "@/lib/adrian-engineering-toolkit"' not in text:
              text = text.replace(
                  'import { readArtToolkit, type ArtToolkit } from "@/lib/adrian-art-toolkit";',
                  'import { readArtToolkit, type ArtToolkit } from "@/lib/adrian-art-toolkit";\nimport { readEngineeringToolkit, type EngineeringToolkit } from "@/lib/adrian-engineering-toolkit";',
                  1,
              )
          text = text.replace(
              '  musicToolkit: MusicToolkit,\n  artToolkit: ArtToolkit\n): PortfolioHighlight[] {',
              '  musicToolkit: MusicToolkit,\n  artToolkit: ArtToolkit,\n  engineeringToolkit: EngineeringToolkit\n): PortfolioHighlight[] {',
              1,
          )
          block = '''  if (engineeringToolkit.cards.length > 0) {
              const latest = engineeringToolkit.cards[engineeringToolkit.cards.length - 1];
              addHighlight(highlights, {
                id: "engineering-toolkit",
                kind: "achievement",
                emoji: "🛠️",
                title: "Engineering Toolkit",
                detail: `${engineeringToolkit.cards.length} engineering tool${engineeringToolkit.cards.length === 1 ? "" : "s"} earned across ${engineeringToolkit.missions} design mission${engineeringToolkit.missions === 1 ? "" : "s"}. Recent tools: ${engineeringToolkit.cards.slice(-4).map((card) => card.label).join(", ")}.`,
                date: latest?.earnedAt ?? engineeringToolkit.updatedAt,
                subject: "Engineering",
                value: `${engineeringToolkit.cards.length} TOOLS`,
              });
            }

          '''
          marker2 = '  if (artToolkit.cards.length > 0 || artToolkit.artworks > 0) {'
          if 'id: "engineering-toolkit"' not in text:
              text = text.replace(marker2, block + marker2, 1)
          text = text.replace(
              '  const artToolkit = readArtToolkit(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger, wellbeingToolkit, healthToolkit, digitalToolkit, musicToolkit, artToolkit);',
              '  const artToolkit = readArtToolkit(profile.id);\n  const engineeringToolkit = readEngineeringToolkit(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger, wellbeingToolkit, healthToolkit, digitalToolkit, musicToolkit, artToolkit, engineeringToolkit);',
              1,
          )
          text = text.replace(
              '  const artSubjects = artToolkit.cards.length > 0 || artToolkit.artworks > 0 ? ["Art" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects, ...wellbeingSubjects, ...healthSubjects, ...digitalSubjects, ...musicSubjects, ...artSubjects]).size;',
              '  const artSubjects = artToolkit.cards.length > 0 || artToolkit.artworks > 0 ? ["Art" as const] : [];\n  const engineeringSubjects = engineeringToolkit.cards.length > 0 ? ["Engineering" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects, ...wellbeingSubjects, ...healthSubjects, ...digitalSubjects, ...musicSubjects, ...artSubjects, ...engineeringSubjects]).size;',
              1,
          )
          portfolio.write_text(text)
          PY
      - name: Commit integration
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/lib/adrian-skill-graph.ts adrianos-play-starter/lib/adrian-portfolio.ts
          if ! git diff --cached --quiet; then
            git commit -m "Integrate Engineering across AdrianOS"
            git push origin HEAD:feature/engineering-lab
          fi
