name: Music Lab Integration Patch

on:
  push:
    branches: [feature/music-lab]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Integrate Music Lab across AdrianOS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/music-lab
      - name: Wire skills and portfolio
        run: |
          python - <<'PY'
          from pathlib import Path

          skills = Path('adrianos-play-starter/lib/adrian-skill-graph.ts')
          text = skills.read_text()
          nodes = '''  {
              id: "music-steady-beat",
              label: "Steady beat",
              subject: "Music",
              description: "Hear, maintain, and compare a steady pulse and changes in tempo.",
              prerequisites: [],
              gameSlug: "music-lab",
              minAge: 4,
              order: 1,
              evidenceSkillIds: ["music-steady-beat"],
            },
            {
              id: "music-rhythm-patterns",
              label: "Rhythm patterns",
              subject: "Music",
              description: "Recognize short and long sounds, rests, repeated rhythm cells, and syncopation.",
              prerequisites: ["music-steady-beat"],
              gameSlug: "music-lab",
              minAge: 4,
              order: 2,
              evidenceSkillIds: ["music-rhythm-patterns"],
            },
            {
              id: "music-pitch-direction",
              label: "Pitch direction",
              subject: "Music",
              description: "Hear whether notes move higher, lower, repeat, form contours, or span larger intervals.",
              prerequisites: [],
              gameSlug: "music-lab",
              minAge: 4,
              order: 3,
              evidenceSkillIds: ["music-pitch-direction"],
            },
            {
              id: "music-listening-form",
              label: "Musical listening",
              subject: "Music",
              description: "Identify repetition, contrast, phrase relationships, and simple musical form.",
              prerequisites: ["music-steady-beat", "music-pitch-direction"],
              gameSlug: "music-lab",
              minAge: 5,
              order: 4,
              evidenceSkillIds: ["music-listening-form"],
            },
            {
              id: "music-composition",
              label: "Simple composition",
              subject: "Music",
              description: "Use motifs, home notes, contour, rhythm, and variation to shape musical ideas.",
              prerequisites: ["music-rhythm-patterns", "music-pitch-direction"],
              gameSlug: "music-lab",
              minAge: 5,
              order: 5,
              evidenceSkillIds: ["music-composition"],
            },
          '''
          marker = '  {\n    id: "coding-sequences",'
          if 'id: "music-steady-beat"' not in text:
              text = text.replace(marker, nodes + marker, 1)
          route = '''  if (node.gameSlug === "music-lab") {
              const level = node.id === "music-steady-beat" || node.id === "music-pitch-direction"
                ? "Beat Starter"
                : node.id === "music-listening-form" || node.id === "music-composition"
                  ? "Music Detective"
                  : "Melody Maker";
              params.set("level", level);
              params.set("focus", node.id);
            }
          '''
          route_marker = '  if (node.gameSlug === "digital-citizenship-lab") {'
          if 'node.gameSlug === "music-lab"' not in text:
              text = text.replace(route_marker, route + route_marker, 1)
          skills.write_text(text)

          portfolio = Path('adrianos-play-starter/lib/adrian-portfolio.ts')
          text = portfolio.read_text()
          if 'from "@/lib/adrian-music-toolkit"' not in text:
              text = text.replace(
                  'import { readDigitalToolkit, type DigitalToolkit } from "@/lib/adrian-digital-toolkit";',
                  'import { readDigitalToolkit, type DigitalToolkit } from "@/lib/adrian-digital-toolkit";\nimport { readMusicToolkit, type MusicToolkit } from "@/lib/adrian-music-toolkit";',
                  1,
              )
          text = text.replace(
              '  healthToolkit: HealthToolkit,\n  digitalToolkit: DigitalToolkit\n): PortfolioHighlight[] {',
              '  healthToolkit: HealthToolkit,\n  digitalToolkit: DigitalToolkit,\n  musicToolkit: MusicToolkit\n): PortfolioHighlight[] {',
              1,
          )
          block = '''  if (musicToolkit.cards.length > 0) {
              const latest = musicToolkit.cards[musicToolkit.cards.length - 1];
              addHighlight(highlights, {
                id: "music-toolkit",
                kind: "achievement",
                emoji: "🎼",
                title: "Music Lab Toolkit",
                detail: `${musicToolkit.cards.length} listening and composition tool${musicToolkit.cards.length === 1 ? "" : "s"} earned across ${musicToolkit.missions} mission${musicToolkit.missions === 1 ? "" : "s"}. Recent tools: ${musicToolkit.cards.slice(-4).map((card) => card.label).join(", ")}.`,
                date: latest?.earnedAt ?? musicToolkit.updatedAt,
                subject: "Music",
                value: `${musicToolkit.cards.length} TOOLS`,
              });
            }

          '''
          marker2 = '  if (digitalToolkit.cards.length > 0) {'
          if 'id: "music-toolkit"' not in text:
              text = text.replace(marker2, block + marker2, 1)
          text = text.replace(
              '  const digitalToolkit = readDigitalToolkit(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger, wellbeingToolkit, healthToolkit, digitalToolkit);',
              '  const digitalToolkit = readDigitalToolkit(profile.id);\n  const musicToolkit = readMusicToolkit(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger, wellbeingToolkit, healthToolkit, digitalToolkit, musicToolkit);',
              1,
          )
          text = text.replace(
              '  const digitalSubjects = digitalToolkit.cards.length > 0 ? ["Digital Citizenship" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects, ...wellbeingSubjects, ...healthSubjects, ...digitalSubjects]).size;',
              '  const digitalSubjects = digitalToolkit.cards.length > 0 ? ["Digital Citizenship" as const] : [];\n  const musicSubjects = musicToolkit.cards.length > 0 ? ["Music" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects, ...wellbeingSubjects, ...healthSubjects, ...digitalSubjects, ...musicSubjects]).size;',
              1,
          )
          portfolio.write_text(text)
          PY
      - name: Commit integration
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/lib/adrian-skill-graph.ts adrianos-play-starter/lib/adrian-portfolio.ts
          if ! git diff --cached --quiet; then
            git commit -m "Integrate Music Lab across AdrianOS"
            git push origin HEAD:feature/music-lab
          fi
