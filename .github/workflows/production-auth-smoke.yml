name: Production Google OAuth Smoke

on:
  workflow_run:
    workflows: ["AdrianOS Build"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  oauth-smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adrianos-play-starter
    steps:
      - name: Check out production branch
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify production Google OAuth handoff
        env:
          ADRIANOS_PRODUCTION_URL: https://adrian-os-murex.vercel.app
          AUTH_SMOKE_ATTEMPTS: 10
          AUTH_SMOKE_PAUSE_MS: 12000
        run: node scripts/check-production-google-oauth.mjs
      - name: Upload OAuth failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-google-oauth-smoke
          path: adrianos-play-starter/test-results/production-auth
          if-no-files-found: warn
