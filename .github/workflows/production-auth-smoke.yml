name: Production Google OAuth Smoke

on:
  workflow_run:
    workflows: ["AdrianOS Build"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  oauth-smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adrianos-play-starter
    env:
      TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      STATUS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Check out production branch
        uses: actions/checkout@v7
        with:
          ref: main
      - name: Publish pending OAuth status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${TARGET_SHA}" \
            --data "{\"state\":\"pending\",\"context\":\"AdrianOS Google OAuth\",\"description\":\"Checking the production Google sign-in handoff\",\"target_url\":\"${STATUS_URL}\"}"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify production Google OAuth handoff
        env:
          ADRIANOS_PRODUCTION_URL: https://adrian-os-murex.vercel.app
          AUTH_SMOKE_ATTEMPTS: 10
          AUTH_SMOKE_PAUSE_MS: 12000
        run: node scripts/check-production-google-oauth.mjs
      - name: Publish successful OAuth status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${TARGET_SHA}" \
            --data "{\"state\":\"success\",\"context\":\"AdrianOS Google OAuth\",\"description\":\"Production Google sign-in handoff passed\",\"target_url\":\"${STATUS_URL}\"}"
      - name: Publish failed OAuth status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${TARGET_SHA}" \
            --data "{\"state\":\"failure\",\"context\":\"AdrianOS Google OAuth\",\"description\":\"Production Google sign-in handoff failed\",\"target_url\":\"${STATUS_URL}\"}"
      - name: Upload OAuth failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-google-oauth-smoke
          path: adrianos-play-starter/test-results/production-auth
          if-no-files-found: warn
