name: Writing Studio Integration Patch

on:
  push:
    branches: [feature/writing-studio]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message != 'Integrate Writing Studio across AdrianOS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/writing-studio
      - name: Wire school, skills, and portfolio
        run: |
          python - <<'PY'
          from pathlib import Path

          school = Path('adrianos-play-starter/app/school/page.tsx')
          text = school.read_text()
          if 'WritingStudioCard' not in text:
              text = text.replace(
                  'import ProjectStudioCard from "@/components/ProjectStudioCard";',
                  'import ProjectStudioCard from "@/components/ProjectStudioCard";\nimport WritingStudioCard from "@/components/WritingStudioCard";',
                  1,
              )
              text = text.replace(
                  '      <ProjectStudioCard />',
                  '      <WritingStudioCard />\n      <ProjectStudioCard />',
                  1,
              )
          school.write_text(text)

          skills = Path('adrianos-play-starter/lib/adrian-skill-graph.ts')
          text = skills.read_text()
          nodes = '''  {
              id: "writing-ideas",
              label: "Planning writing ideas",
              subject: "Reading",
              description: "Choose a clear topic, characters, reasons, facts, or events before drafting.",
              prerequisites: ["reading-comprehension-detail"],
              gameSlug: "writing-studio",
              minAge: 4,
              order: 8,
              evidenceSkillIds: ["writing-ideas"],
            },
            {
              id: "writing-sentences",
              label: "Sentence construction",
              subject: "Reading",
              description: "Turn ideas into complete sentences with enough detail for the writer’s level.",
              prerequisites: ["writing-ideas"],
              gameSlug: "writing-studio",
              minAge: 5,
              order: 9,
              evidenceSkillIds: ["writing-sentences"],
            },
            {
              id: "writing-conventions",
              label: "Capitalization and punctuation",
              subject: "Reading",
              description: "Use capital letters and ending punctuation to make sentences easy to read.",
              prerequisites: ["writing-sentences"],
              gameSlug: "writing-studio",
              minAge: 6,
              order: 10,
              evidenceSkillIds: ["writing-conventions"],
            },
            {
              id: "writing-organization",
              label: "Organizing a paragraph",
              subject: "Reading",
              description: "Connect events, reasons, or steps in a clear and useful order.",
              prerequisites: ["writing-sentences"],
              gameSlug: "writing-studio",
              minAge: 6,
              order: 11,
              evidenceSkillIds: ["writing-organization"],
            },
            {
              id: "writing-revision",
              label: "Revising a draft",
              subject: "Reading",
              description: "Reread a first draft and make a meaningful improvement before publishing.",
              prerequisites: ["writing-conventions", "writing-organization"],
              gameSlug: "writing-studio",
              minAge: 7,
              order: 12,
              evidenceSkillIds: ["writing-revision"],
            },
          '''
          marker = '  {\n    id: "science-earth",'
          if 'id: "writing-ideas"' not in text:
              text = text.replace(marker, nodes + marker, 1)
          skills.write_text(text)

          portfolio = Path('adrianos-play-starter/lib/adrian-portfolio.ts')
          text = portfolio.read_text()
          writing_import = '''import {
            getWritingPrompt,
            readWritingHistory,
            writingArtifactSummary,
            type WritingPiece,
          } from "@/lib/adrian-writing";
          '''
          if 'from "@/lib/adrian-writing"' not in text:
              text = text.replace(
                  'import { getSkillGraph, type SkillNode } from "@/lib/adrian-skill-graph";',
                  writing_import + 'import { getSkillGraph, type SkillNode } from "@/lib/adrian-skill-graph";',
                  1,
              )
          text = text.replace(
              '  projects: ProjectWork[]\n): PortfolioHighlight[] {',
              '  projects: ProjectWork[],\n  writings: WritingPiece[]\n): PortfolioHighlight[] {',
              1,
          )
          writing_loop = '''  for (const piece of writings.slice(0, 10)) {
              const prompt = getWritingPrompt(piece.promptId);
              if (!prompt || !piece.completedAt) continue;
              addHighlight(highlights, {
                id: `writing:${piece.id}`,
                kind: "achievement",
                emoji: prompt.emoji,
                title: piece.title || prompt.title,
                detail: writingArtifactSummary(piece),
                date: piece.completedAt,
                subject: "Reading",
                value: "PUBLISHED",
              });
            }

          '''
          project_loop = '  for (const project of projects.slice(0, 10)) {'
          if 'id: `writing:${piece.id}`' not in text:
              text = text.replace(project_loop, writing_loop + project_loop, 1)
          text = text.replace(
              '  const projects = readProjectHistory(profile.id).filter((project) => Boolean(project.completedAt));\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects);',
              '  const projects = readProjectHistory(profile.id).filter((project) => Boolean(project.completedAt));\n  const writings = readWritingHistory(profile.id).filter((piece) => Boolean(piece.completedAt));\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings);',
              1,
          )
          text = text.replace(
              '  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects]).size;',
              '  const writingSubjects = writings.length > 0 ? ["Reading" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects]).size;',
              1,
          )
          text = text.replace(
              '  const projectText = projects.length > 0\n    ? ` and ${projects.length} completed project${projects.length === 1 ? "" : "s"}`\n    : "";',
              '  const projectText = projects.length > 0\n    ? `, ${projects.length} completed project${projects.length === 1 ? "" : "s"}`\n    : "";\n  const writingText = writings.length > 0\n    ? `, and ${writings.length} published writing piece${writings.length === 1 ? "" : "s"}`\n    : "";',
              1,
          )
          text = text.replace(
              '  const summary = activeSkills === 0 && projects.length === 0',
              '  const summary = activeSkills === 0 && projects.length === 0 && writings.length === 0',
              1,
          )
          text = text.replace(
              '${projectText}.`;',
              '${projectText}${writingText}.`;',
              1,
          )
          portfolio.write_text(text)
          PY
      - name: Commit integration
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/app/school/page.tsx adrianos-play-starter/lib/adrian-skill-graph.ts adrianos-play-starter/lib/adrian-portfolio.ts
          if ! git diff --cached --quiet; then
            git commit -m "Integrate Writing Studio across AdrianOS"
            git push origin HEAD:feature/writing-studio
          fi
