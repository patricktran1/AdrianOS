name: Project Studio Patch

on:
  push:
    branches: [feature/project-studio]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message != 'Apply Project Studio page fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/project-studio
      - name: Apply exact page fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('adrianos-play-starter/app/projects/page.tsx')
          text = path.read_text()
          text = text.replace(
              '    setParentNote(next.parentNote);\n    setMessage("");\n  }, [activeProfile.id, activeProfile.age, profilesReady, progressReady, parentMode, revision]);',
              '    setParentNote(next.parentNote);\n  }, [activeProfile.id, activeProfile.age, profilesReady, progressReady, parentMode, revision]);',
          )
          text = text.replace(
              '    const correct = option === template.answer;',
              '    const correct = option === template.discover.answer;',
          )
          path.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/app/projects/page.tsx
          if ! git diff --cached --quiet; then
            git commit -m "Apply Project Studio page fixes"
            git push origin HEAD:feature/project-studio
          fi
