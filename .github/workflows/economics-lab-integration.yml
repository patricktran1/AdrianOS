name: Economics Lab Integration Patch

on:
  push:
    branches: [feature/economics-lab]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Integrate Economics Lab across AdrianOS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/economics-lab
      - name: Wire skills and portfolio
        run: |
          python - <<'PY'
          from pathlib import Path

          skills = Path('adrianos-play-starter/lib/adrian-skill-graph.ts')
          text = skills.read_text()
          nodes = '''  {
              id: "economics-needs-scarcity",
              label: "Needs, wants, and scarcity",
              subject: "Economics",
              description: "Distinguish needs from wants and reason about limited time, money, space, and resources.",
              prerequisites: [],
              gameSlug: "economics-lab",
              minAge: 4,
              order: 1,
              evidenceSkillIds: ["economics-needs-scarcity"],
            },
            {
              id: "economics-budget-saving",
              label: "Budgeting and saving",
              subject: "Economics",
              description: "Build balanced plans, save toward goals, prepare for surprises, and adapt when costs change.",
              prerequisites: ["economics-needs-scarcity"],
              gameSlug: "economics-lab",
              minAge: 5,
              order: 2,
              evidenceSkillIds: ["economics-budget-saving"],
            },
            {
              id: "economics-tradeoffs",
              label: "Trade-offs and opportunity cost",
              subject: "Economics",
              description: "Identify what a choice gives up and compare immediate and future benefits and costs.",
              prerequisites: ["economics-needs-scarcity"],
              gameSlug: "economics-lab",
              minAge: 5,
              order: 3,
              evidenceSkillIds: ["economics-tradeoffs"],
            },
            {
              id: "economics-markets-prices",
              label: "Markets, prices, and exchange",
              subject: "Economics",
              description: "Interpret supply, demand, price signals, voluntary exchange, competition, and value.",
              prerequisites: ["economics-needs-scarcity", "economics-tradeoffs"],
              gameSlug: "economics-lab",
              minAge: 6,
              order: 4,
              evidenceSkillIds: ["economics-markets-prices"],
            },
            {
              id: "economics-work-enterprise",
              label: "Work, value, and enterprise",
              subject: "Economics",
              description: "Understand costs, profit, productivity, entrepreneurship, reinvestment, and incentives.",
              prerequisites: ["economics-budget-saving"],
              gameSlug: "economics-lab",
              minAge: 6,
              order: 5,
              evidenceSkillIds: ["economics-work-enterprise"],
            },
          '''
          marker = '  {\n    id: "coding-sequences",'
          if 'id: "economics-needs-scarcity"' not in text:
              text = text.replace(marker, nodes + marker, 1)
          route = '''  if (node.gameSlug === "economics-lab") {
              const level = node.id === "economics-needs-scarcity"
                ? "Money Explorer"
                : node.id === "economics-markets-prices" || node.id === "economics-work-enterprise"
                  ? "Market Thinker"
                  : "Budget Builder";
              params.set("level", level);
              params.set("focus", node.id);
            }
          '''
          route_marker = '  if (node.gameSlug === "civic-lab") {'
          if 'node.gameSlug === "economics-lab"' not in text:
              text = text.replace(route_marker, route + route_marker, 1)
          skills.write_text(text)

          portfolio = Path('adrianos-play-starter/lib/adrian-portfolio.ts')
          text = portfolio.read_text()
          if 'from "@/lib/adrian-economics-ledger"' not in text:
              text = text.replace(
                  'import { readCivicToolbox, type CivicToolbox } from "@/lib/adrian-civic-toolbox";',
                  'import { readCivicToolbox, type CivicToolbox } from "@/lib/adrian-civic-toolbox";\nimport { readEconomicsLedger, type EconomicsLedger } from "@/lib/adrian-economics-ledger";',
                  1,
              )
          text = text.replace(
              '  historyArchive: HistoryArchive,\n  civicToolbox: CivicToolbox\n): PortfolioHighlight[] {',
              '  historyArchive: HistoryArchive,\n  civicToolbox: CivicToolbox,\n  economicsLedger: EconomicsLedger\n): PortfolioHighlight[] {',
              1,
          )
          economics_block = '''  if (economicsLedger.cards.length > 0) {
              const latest = economicsLedger.cards[economicsLedger.cards.length - 1];
              addHighlight(highlights, {
                id: "economics-ledger",
                kind: "achievement",
                emoji: "💡",
                title: "Economics Decision Ledger",
                detail: `${economicsLedger.cards.length} decision tool${economicsLedger.cards.length === 1 ? "" : "s"} earned across ${economicsLedger.missions} mission${economicsLedger.missions === 1 ? "" : "s"}. Recent tools: ${economicsLedger.cards.slice(-4).map((card) => card.label).join(", ")}.`,
                date: latest?.earnedAt ?? economicsLedger.updatedAt,
                subject: "Economics",
                value: `${economicsLedger.cards.length} TOOLS`,
              });
            }

          '''
          civic_marker = '  if (civicToolbox.cards.length > 0) {'
          if 'id: "economics-ledger"' not in text:
              text = text.replace(civic_marker, economics_block + civic_marker, 1)
          text = text.replace(
              '  const civicToolbox = readCivicToolbox(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox);',
              '  const civicToolbox = readCivicToolbox(profile.id);\n  const economicsLedger = readEconomicsLedger(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger);',
              1,
          )
          text = text.replace(
              '  const civicSubjects = civicToolbox.cards.length > 0 ? ["Civics" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects]).size;',
              '  const civicSubjects = civicToolbox.cards.length > 0 ? ["Civics" as const] : [];\n  const economicsSubjects = economicsLedger.cards.length > 0 ? ["Economics" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects]).size;',
              1,
          )
          portfolio.write_text(text)
          PY
      - name: Commit integration
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/lib/adrian-skill-graph.ts adrianos-play-starter/lib/adrian-portfolio.ts
          if ! git diff --cached --quiet; then
            git commit -m "Integrate Economics Lab across AdrianOS"
            git push origin HEAD:feature/economics-lab
          fi
