name: Commit verified AdrianOS lockfile

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/commit-lockfile.yml'

permissions:
  contents: write

concurrency:
  group: adrianos-lockfile-commit
  cancel-in-progress: false

jobs:
  commit-lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: adrianos-play-starter

    steps:
      - name: Check out current pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate and verify lockfile
        run: |
          npm install --no-audit --no-fund
          npm ci --no-audit --no-fund
          git diff --check

      - name: Verify scope and commit
        shell: bash
        run: |
          rm -rf node_modules
          changed="$(git status --short)"
          test "$changed" = '?? package-lock.json'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'Add reproducible AdrianOS npm lockfile'
          git push origin HEAD:${{ github.head_ref }}
