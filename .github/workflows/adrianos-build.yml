name: AdrianOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adrianos-play-starter
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build AdrianOS
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adrianos-build-log
          path: adrianos-play-starter/build.log
          if-no-files-found: warn
