name: Generate AdrianOS npm lockfile

on:
  pull_request:
    branches: [main]
    paths:
      - 'adrianos-play-starter/package.json'
      - '.github/workflows/generate-lockfile.yml'

permissions:
  contents: read

concurrency:
  group: adrianos-lockfile-artifact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: adrianos-play-starter

    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate and verify lockfile
        run: |
          npm install --no-audit --no-fund
          npm ci --no-audit --no-fund
          git diff --check
          test -f package-lock.json

      - name: Upload verified lockfile
        uses: actions/upload-artifact@v4
        with:
          name: adrianos-package-lock
          path: adrianos-play-starter/package-lock.json
          if-no-files-found: error
          retention-days: 5
