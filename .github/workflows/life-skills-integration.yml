name: Life Skills Integration Patch

on:
  push:
    branches: [feature/life-skills-lab]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Integrate Life Skills across AdrianOS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/life-skills-lab
      - name: Wire skills and portfolio
        run: |
          python - <<'PY'
          from pathlib import Path

          skills = Path('adrianos-play-starter/lib/adrian-skill-graph.ts')
          text = skills.read_text()
          nodes = '''  {
              id: "life-routines-time",
              label: "Routines and time planning",
              subject: "Life Skills",
              description: "Sequence routines, plan backward, and choose priorities using deadlines and consequences.",
              prerequisites: [],
              gameSlug: "life-skills-lab",
              minAge: 4,
              order: 1,
              evidenceSkillIds: ["life-routines-time"],
            },
            {
              id: "life-organization",
              label: "Organization and task setup",
              subject: "Life Skills",
              description: "Create homes for materials, prepare launch pads, order steps, and maintain simple systems.",
              prerequisites: [],
              gameSlug: "life-skills-lab",
              minAge: 4,
              order: 2,
              evidenceSkillIds: ["life-organization"],
            },
            {
              id: "life-food-prep",
              label: "Simple food preparation",
              subject: "Life Skills",
              description: "Use clean preparation, age-safe tools, food stop checks, and recipe previews.",
              prerequisites: [],
              gameSlug: "life-skills-lab",
              minAge: 4,
              order: 3,
              evidenceSkillIds: ["life-food-prep"],
            },
            {
              id: "life-home-responsibility",
              label: "Household responsibility",
              subject: "Life Skills",
              description: "Notice hazards, restore shared spaces, follow care instructions, and complete household steps responsibly.",
              prerequisites: ["life-organization"],
              gameSlug: "life-skills-lab",
              minAge: 4,
              order: 4,
              evidenceSkillIds: ["life-home-responsibility"],
            },
            {
              id: "life-help-communication",
              label: "Asking for help and communicating needs",
              subject: "Life Skills",
              description: "Make specific help requests, give honest updates, and clarify instructions early.",
              prerequisites: [],
              gameSlug: "life-skills-lab",
              minAge: 4,
              order: 5,
              evidenceSkillIds: ["life-help-communication"],
            },
          '''
          marker = '  {\n    id: "coding-sequences",'
          if 'id: "life-routines-time"' not in text:
              text = text.replace(marker, nodes + marker, 1)
          route = '''  if (node.gameSlug === "life-skills-lab") {
              const level = node.id === "life-routines-time" || node.id === "life-organization"
                ? "Helper"
                : node.id === "life-home-responsibility"
                  ? "Life Planner"
                  : "Independent Starter";
              params.set("level", level);
              params.set("focus", node.id);
            }
          '''
          route_marker = '  if (node.gameSlug === "movement-lab") {'
          if 'node.gameSlug === "life-skills-lab"' not in text:
              text = text.replace(route_marker, route + route_marker, 1)
          skills.write_text(text)

          portfolio = Path('adrianos-play-starter/lib/adrian-portfolio.ts')
          text = portfolio.read_text()
          if 'from "@/lib/adrian-life-skills-toolkit"' not in text:
              text = text.replace(
                  'import { readMovementToolkit, type MovementToolkit } from "@/lib/adrian-movement-toolkit";',
                  'import { readMovementToolkit, type MovementToolkit } from "@/lib/adrian-movement-toolkit";\nimport { readLifeSkillsToolkit, type LifeSkillsToolkit } from "@/lib/adrian-life-skills-toolkit";',
                  1,
              )
          text = text.replace(
              '  engineeringToolkit: EngineeringToolkit,\n  movementToolkit: MovementToolkit\n): PortfolioHighlight[] {',
              '  engineeringToolkit: EngineeringToolkit,\n  movementToolkit: MovementToolkit,\n  lifeSkillsToolkit: LifeSkillsToolkit\n): PortfolioHighlight[] {',
              1,
          )
          block = '''  if (lifeSkillsToolkit.tools.length > 0) {
              const latest = lifeSkillsToolkit.tools[lifeSkillsToolkit.tools.length - 1];
              addHighlight(highlights, {
                id: "life-skills-toolkit",
                kind: "achievement",
                emoji: "🧭",
                title: "Independence Toolkit",
                detail: `${lifeSkillsToolkit.tools.length} practical tool${lifeSkillsToolkit.tools.length === 1 ? "" : "s"} earned across ${lifeSkillsToolkit.missions} life-skills mission${lifeSkillsToolkit.missions === 1 ? "" : "s"}. Recent tools: ${lifeSkillsToolkit.tools.slice(-4).map((tool) => tool.label).join(", ")}.`,
                date: latest?.earnedAt ?? lifeSkillsToolkit.updatedAt,
                subject: "Life Skills",
                value: `${lifeSkillsToolkit.tools.length} TOOLS`,
              });
            }

          '''
          marker2 = '  if (movementToolkit.cards.length > 0) {'
          if 'id: "life-skills-toolkit"' not in text:
              text = text.replace(marker2, block + marker2, 1)
          text = text.replace(
              '  const movementToolkit = readMovementToolkit(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger, wellbeingToolkit, healthToolkit, digitalToolkit, musicToolkit, artToolkit, engineeringToolkit, movementToolkit);',
              '  const movementToolkit = readMovementToolkit(profile.id);\n  const lifeSkillsToolkit = readLifeSkillsToolkit(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger, wellbeingToolkit, healthToolkit, digitalToolkit, musicToolkit, artToolkit, engineeringToolkit, movementToolkit, lifeSkillsToolkit);',
              1,
          )
          text = text.replace(
              '  const movementSubjects = movementToolkit.cards.length > 0 ? ["Movement" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects, ...wellbeingSubjects, ...healthSubjects, ...digitalSubjects, ...musicSubjects, ...artSubjects, ...engineeringSubjects, ...movementSubjects]).size;',
              '  const movementSubjects = movementToolkit.cards.length > 0 ? ["Movement" as const] : [];\n  const lifeSkillsSubjects = lifeSkillsToolkit.tools.length > 0 ? ["Life Skills" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects, ...wellbeingSubjects, ...healthSubjects, ...digitalSubjects, ...musicSubjects, ...artSubjects, ...engineeringSubjects, ...movementSubjects, ...lifeSkillsSubjects]).size;',
              1,
          )
          portfolio.write_text(text)
          PY
      - name: Commit integration
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/lib/adrian-skill-graph.ts adrianos-play-starter/lib/adrian-portfolio.ts
          if ! git diff --cached --quiet; then
            git commit -m "Integrate Life Skills across AdrianOS"
            git push origin HEAD:feature/life-skills-lab
          fi
