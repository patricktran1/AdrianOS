name: History Lab Integration Patch

on:
  push:
    branches: [feature/history-lab]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message != 'Integrate History Lab across AdrianOS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/history-lab
      - name: Wire skills and portfolio
        run: |
          python - <<'PY'
          from pathlib import Path

          skills = Path('adrianos-play-starter/lib/adrian-skill-graph.ts')
          text = skills.read_text()
          nodes = '''  {
              id: "history-chronology",
              label: "Chronology and timelines",
              subject: "History",
              description: "Place events in order, compare dates, and reason about overlapping timelines.",
              prerequisites: [],
              gameSlug: "history-lab",
              minAge: 4,
              order: 1,
              evidenceSkillIds: ["history-chronology"],
            },
            {
              id: "history-change-continuity",
              label: "Change and continuity",
              subject: "History",
              description: "Identify what changed over time and what continued beneath new tools or institutions.",
              prerequisites: ["history-chronology"],
              gameSlug: "history-lab",
              minAge: 5,
              order: 2,
              evidenceSkillIds: ["history-change-continuity"],
            },
            {
              id: "history-cause-effect",
              label: "Historical cause and effect",
              subject: "History",
              description: "Separate causes, effects, triggers, and longer-term conditions in historical change.",
              prerequisites: ["history-chronology"],
              gameSlug: "history-lab",
              minAge: 6,
              order: 3,
              evidenceSkillIds: ["history-cause-effect"],
            },
            {
              id: "history-sources-evidence",
              label: "Historical sources and evidence",
              subject: "History",
              description: "Use artifacts, documents, corroboration, source purpose, and direct evidence to test claims.",
              prerequisites: ["history-chronology"],
              gameSlug: "history-lab",
              minAge: 6,
              order: 4,
              evidenceSkillIds: ["history-sources-evidence"],
            },
            {
              id: "history-perspective",
              label: "Historical perspective",
              subject: "History",
              description: "Compare viewpoints, connect accounts to roles, and notice whose voice is absent.",
              prerequisites: ["history-sources-evidence"],
              gameSlug: "history-lab",
              minAge: 7,
              order: 5,
              evidenceSkillIds: ["history-perspective"],
            },
          '''
          marker = '  {\n    id: "coding-sequences",'
          if 'id: "history-chronology"' not in text:
              text = text.replace(marker, nodes + marker, 1)
          route = '''  if (node.gameSlug === "history-lab") {
              const level = node.id === "history-chronology"
                ? "Time Traveler"
                : node.id === "history-perspective"
                  ? "Evidence Detective"
                  : "Historian";
              params.set("level", level);
              params.set("focus", node.id);
            }
          '''
          route_marker = '  if (node.gameSlug === "world-explorer") {'
          if 'node.gameSlug === "history-lab"' not in text:
              text = text.replace(route_marker, route + route_marker, 1)
          skills.write_text(text)

          portfolio = Path('adrianos-play-starter/lib/adrian-portfolio.ts')
          text = portfolio.read_text()
          if 'from "@/lib/adrian-history-archive"' not in text:
              text = text.replace(
                  'import { getSkillGraph, type SkillNode } from "@/lib/adrian-skill-graph";',
                  'import { getSkillGraph, type SkillNode } from "@/lib/adrian-skill-graph";\nimport { readHistoryArchive, type HistoryArchive } from "@/lib/adrian-history-archive";',
                  1,
              )
          text = text.replace(
              '  writings: WritingPiece[],\n  passport: WorldPassport\n): PortfolioHighlight[] {',
              '  writings: WritingPiece[],\n  passport: WorldPassport,\n  historyArchive: HistoryArchive\n): PortfolioHighlight[] {',
              1,
          )
          history_block = '''  if (historyArchive.cards.length > 0) {
              const latest = historyArchive.cards[historyArchive.cards.length - 1];
              addHighlight(highlights, {
                id: "history-archive",
                kind: "achievement",
                emoji: "🏛️",
                title: "History Lab Archive",
                detail: `${historyArchive.cards.length} evidence card${historyArchive.cards.length === 1 ? "" : "s"} collected across ${historyArchive.investigations} investigation${historyArchive.investigations === 1 ? "" : "s"}. Recent cards: ${historyArchive.cards.slice(-4).map((card) => card.label).join(", ")}.`,
                date: latest?.earnedAt ?? historyArchive.updatedAt,
                subject: "History",
                value: `${historyArchive.cards.length} CARDS`,
              });
            }

          '''
          passport_marker = '  if (passport.stamps.length > 0) {'
          if 'id: "history-archive"' not in text:
              text = text.replace(passport_marker, history_block + passport_marker, 1)
          text = text.replace(
              '  const passport = readWorldPassport(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport);',
              '  const passport = readWorldPassport(profile.id);\n  const historyArchive = readHistoryArchive(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive);',
              1,
          )
          text = text.replace(
              '  const passportSubjects = passport.stamps.length > 0 ? ["Geography" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects]).size;',
              '  const passportSubjects = passport.stamps.length > 0 ? ["Geography" as const] : [];\n  const historySubjects = historyArchive.cards.length > 0 ? ["History" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects]).size;',
              1,
          )
          portfolio.write_text(text)
          PY
      - name: Commit integration
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/lib/adrian-skill-graph.ts adrianos-play-starter/lib/adrian-portfolio.ts
          if ! git diff --cached --quiet; then
            git commit -m "Integrate History Lab across AdrianOS"
            git push origin HEAD:feature/history-lab
          fi
