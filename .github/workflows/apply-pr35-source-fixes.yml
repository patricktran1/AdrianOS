name: Apply PR35 source fixes

on:
  push:
    branches:
      - agent/blank-slate-learning-profile
    paths:
      - .github/workflows/apply-pr35-source-fixes.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/blank-slate-learning-profile
          fetch-depth: 0

      - name: Apply exact source patches
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Expected source block not found in {path}: {old[:120]!r}")
              file.write_text(text.replace(old, new, 1))

          prefix = Path("adrianos-play-starter")

          setup = prefix / "components/FamilySetup.tsx"
          replace(
              setup,
              'manageMode ? "Save learner profiles" : "Create family and personalize School Mode"',
              'manageMode ? "Save learner profiles" : "Create family and open School Mode"',
          )

          onboarding_test = prefix / "tests/e2e/blank-slate-learning-profile.spec.ts"
          replace(
              onboarding_test,
              'getByRole("button", { name: "Create family and personalize School Mode" })',
              'getByRole("button", { name: "Create family and open School Mode" })',
          )

          placement = prefix / "app/games/placement-adventure/page.tsx"
          replace(
              placement,
              'import { getActiveProfile } from "@/lib/adrian-profiles";',
              'import { useFamilyProfiles } from "@/lib/adrian-profiles";',
          )
          replace(
              placement,
              '  const profile = getActiveProfile();',
              '  const { activeProfile: profile, hydrated: profilesReady } = useFamilyProfiles();',
          )
          replace(
              placement,
              '  const [report, setReport] = useState<PlacementReport | null>(() => readPlacementReport(profile.id));',
              '  const [report, setReport] = useState<PlacementReport | null>(null);',
          )
          replace(
              placement,
              '  const hadPlacement = useRef(Boolean(readPlacementReport(profile.id)));\n\n  useEffect(() => {',
              '  const hadPlacement = useRef(false);\n\n  useEffect(() => {\n    if (!profilesReady) return;\n    const currentReport = readPlacementReport(profile.id);\n    setReport(currentReport);\n    hadPlacement.current = Boolean(currentReport);\n  }, [profile.id, profilesReady]);\n\n  useEffect(() => {',
          )

          daily = prefix / "lib/adrian-daily-session.ts"
          replace(
              daily,
              '''function scheduledItems(items: AdventureItem[], mode: LearningDayMode): AdventureItem[] {
            if (mode === "full") return items.slice(0, 3);
            if (mode === "light") {
              const focused = items.find((item) => item.gameSlug === "placement-adventure")
                ?? items.find((item) => item.kind === "review")
                ?? items.find((item) => item.kind === "skill")
                ?? items[0];
              return focused ? [focused] : [];
            }
            const explore = items.find((item) => item.kind === "explore") ?? items[items.length - 1] ?? items[0];
            return explore ? [explore] : [];
          }

          function sessionMinutes(profileId: string, mode: LearningDayMode, scheduledMinutes: number): number {
            const settings = readLearningProfile(profileId);
            if (!settings.configured) return scheduledMinutes;
            if (mode === "full") return settings.sessionMinutes;
            return Math.min(8, settings.sessionMinutes);
          }''',
              '''function scheduledItems(items: AdventureItem[], mode: LearningDayMode): AdventureItem[] {
            if (mode === "full") return items.slice(0, 3);
            const placement = items.find((item) => item.gameSlug === "placement-adventure");
            if (placement) return [placement];
            if (mode === "light") {
              const focused = items.find((item) => item.kind === "review")
                ?? items.find((item) => item.kind === "skill")
                ?? items[0];
              return focused ? [focused] : [];
            }
            const explore = items.find((item) => item.kind === "explore") ?? items[items.length - 1] ?? items[0];
            return explore ? [explore] : [];
          }

          function sessionMinutes(
            profileId: string,
            mode: LearningDayMode,
            scheduledMinutes: number,
            placementFirst: boolean
          ): number {
            const settings = readLearningProfile(profileId);
            if (!settings.configured) return scheduledMinutes;
            if (placementFirst || mode === "full") return settings.sessionMinutes;
            return Math.min(8, settings.sessionMinutes);
          }''',
          )
          replace(
              daily,
              '    recommendedMinutes: sessionMinutes(profile.id, plan.mode, plan.minutes),',
              '    recommendedMinutes: sessionMinutes(\n      profile.id,\n      plan.mode,\n      plan.minutes,\n      selectedItems[0]?.gameSlug === "placement-adventure"\n    ),',
          )

          Path(".github/workflows/apply-pr35-source-fixes.yml").unlink()

      - name: Commit focused fixes
        run: |
          git config user.name "AdrianOS Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix blank-slate browser regressions"
          git push origin HEAD:agent/blank-slate-learning-profile
