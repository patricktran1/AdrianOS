name: Wellbeing Lab Integration Patch

on:
  push:
    branches: [feature/feelings-friendship-lab]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Integrate Wellbeing Lab across AdrianOS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/feelings-friendship-lab
      - name: Wire skills and portfolio
        run: |
          python - <<'PY'
          from pathlib import Path

          skills = Path('adrianos-play-starter/lib/adrian-skill-graph.ts')
          text = skills.read_text()
          nodes = '''  {
              id: "wellbeing-emotional-awareness",
              label: "Emotional awareness",
              subject: "Wellbeing",
              description: "Name emotions, notice body clues, and recognize that several feelings can be true at once.",
              prerequisites: [],
              gameSlug: "feelings-friendship-lab",
              minAge: 4,
              order: 1,
              evidenceSkillIds: ["wellbeing-emotional-awareness"],
            },
            {
              id: "wellbeing-self-regulation",
              label: "Self-regulation",
              subject: "Wellbeing",
              description: "Pause, calm the body, separate worries from plans, and focus effort on controllable actions.",
              prerequisites: ["wellbeing-emotional-awareness"],
              gameSlug: "feelings-friendship-lab",
              minAge: 4,
              order: 2,
              evidenceSkillIds: ["wellbeing-self-regulation"],
            },
            {
              id: "wellbeing-communication-listening",
              label: "Communication and listening",
              subject: "Wellbeing",
              description: "Make clear requests, listen for understanding, use I-messages, and discuss difficult problems directly.",
              prerequisites: ["wellbeing-emotional-awareness"],
              gameSlug: "feelings-friendship-lab",
              minAge: 5,
              order: 3,
              evidenceSkillIds: ["wellbeing-communication-listening"],
            },
            {
              id: "wellbeing-empathy-perspective",
              label: "Empathy and perspective",
              subject: "Wellbeing",
              description: "Respect different experiences, hold two perspectives at once, and use curiosity before assumptions.",
              prerequisites: ["wellbeing-emotional-awareness", "wellbeing-communication-listening"],
              gameSlug: "feelings-friendship-lab",
              minAge: 5,
              order: 4,
              evidenceSkillIds: ["wellbeing-empathy-perspective"],
            },
            {
              id: "wellbeing-conflict-boundaries",
              label: "Conflict resolution and boundaries",
              subject: "Wellbeing",
              description: "Create fair solutions, repair harm, state boundaries clearly, and protect privacy and consent.",
              prerequisites: ["wellbeing-self-regulation", "wellbeing-communication-listening"],
              gameSlug: "feelings-friendship-lab",
              minAge: 5,
              order: 5,
              evidenceSkillIds: ["wellbeing-conflict-boundaries"],
            },
          '''
          marker = '  {\n    id: "coding-sequences",'
          if 'id: "wellbeing-emotional-awareness"' not in text:
              text = text.replace(marker, nodes + marker, 1)
          route = '''  if (node.gameSlug === "feelings-friendship-lab") {
              const level = node.id === "wellbeing-emotional-awareness" || node.id === "wellbeing-self-regulation"
                ? "Feelings Finder"
                : node.id === "wellbeing-conflict-boundaries"
                  ? "Calm Problem Solver"
                  : "Friendship Builder";
              params.set("level", level);
              params.set("focus", node.id);
            }
          '''
          route_marker = '  if (node.gameSlug === "economics-lab") {'
          if 'node.gameSlug === "feelings-friendship-lab"' not in text:
              text = text.replace(route_marker, route + route_marker, 1)
          skills.write_text(text)

          portfolio = Path('adrianos-play-starter/lib/adrian-portfolio.ts')
          text = portfolio.read_text()
          if 'from "@/lib/adrian-wellbeing-toolkit"' not in text:
              text = text.replace(
                  'import { readEconomicsLedger, type EconomicsLedger } from "@/lib/adrian-economics-ledger";',
                  'import { readEconomicsLedger, type EconomicsLedger } from "@/lib/adrian-economics-ledger";\nimport { readWellbeingToolkit, type WellbeingToolkit } from "@/lib/adrian-wellbeing-toolkit";',
                  1,
              )
          text = text.replace(
              '  civicToolbox: CivicToolbox,\n  economicsLedger: EconomicsLedger\n): PortfolioHighlight[] {',
              '  civicToolbox: CivicToolbox,\n  economicsLedger: EconomicsLedger,\n  wellbeingToolkit: WellbeingToolkit\n): PortfolioHighlight[] {',
              1,
          )
          wellbeing_block = '''  if (wellbeingToolkit.cards.length > 0) {
              const latest = wellbeingToolkit.cards[wellbeingToolkit.cards.length - 1];
              addHighlight(highlights, {
                id: "wellbeing-toolkit",
                kind: "achievement",
                emoji: "💛",
                title: "Calm & Friendship Toolkit",
                detail: `${wellbeingToolkit.cards.length} social-emotional tool${wellbeingToolkit.cards.length === 1 ? "" : "s"} earned across ${wellbeingToolkit.missions} practice mission${wellbeingToolkit.missions === 1 ? "" : "s"}. Recent tools: ${wellbeingToolkit.cards.slice(-4).map((card) => card.label).join(", ")}.`,
                date: latest?.earnedAt ?? wellbeingToolkit.updatedAt,
                subject: "Wellbeing",
                value: `${wellbeingToolkit.cards.length} TOOLS`,
              });
            }

          '''
          economics_marker = '  if (economicsLedger.cards.length > 0) {'
          if 'id: "wellbeing-toolkit"' not in text:
              text = text.replace(economics_marker, wellbeing_block + economics_marker, 1)
          text = text.replace(
              '  const economicsLedger = readEconomicsLedger(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger);',
              '  const economicsLedger = readEconomicsLedger(profile.id);\n  const wellbeingToolkit = readWellbeingToolkit(profile.id);\n  const highlights = buildHighlights(profile, progress, games, transcript, reports, sessions, projects, writings, passport, historyArchive, civicToolbox, economicsLedger, wellbeingToolkit);',
              1,
          )
          text = text.replace(
              '  const economicsSubjects = economicsLedger.cards.length > 0 ? ["Economics" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects]).size;',
              '  const economicsSubjects = economicsLedger.cards.length > 0 ? ["Economics" as const] : [];\n  const wellbeingSubjects = wellbeingToolkit.cards.length > 0 ? ["Wellbeing" as const] : [];\n  const subjectsWithEvidence = new Set([...transcript.map((row) => row.subject), ...projectSubjects, ...writingSubjects, ...passportSubjects, ...historySubjects, ...civicSubjects, ...economicsSubjects, ...wellbeingSubjects]).size;',
              1,
          )
          portfolio.write_text(text)
          PY
      - name: Commit integration
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/lib/adrian-skill-graph.ts adrianos-play-starter/lib/adrian-portfolio.ts
          if ! git diff --cached --quiet; then
            git commit -m "Integrate Wellbeing Lab across AdrianOS"
            git push origin HEAD:feature/feelings-friendship-lab
          fi
