name: Guess Who School Mode Patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'fix/guess-who-school-mode'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/guess-who-school-mode
      - name: Patch Guess Who controls
        run: |
          python - <<'PY'
          from pathlib import Path
          page = Path('adrianos-play-starter/app/games/guess-who/GuessWhoGame.tsx')
          text = page.read_text()
          old = '''            {humanAnswer !== null && (
              <>
                <p>
                  Flip cards yourself, or let the game remove every non-match.
                </p>'''
          new = '''            <button
              type="button"
              className={styles.guessNowButton}
              onClick={() => setGuessOpen(true)}
            >
              🎯 Make a guess
            </button>

            {humanAnswer !== null && (
              <>
                <p>
                  Flip cards yourself, or let the game remove every non-match.
                </p>'''
          if 'className={styles.guessNowButton}' not in text:
              text = text.replace(old, new, 1)
          old2 = '''          <div>
            <span className={styles.eyebrow}>PLAYER {currentPlayer}</span>
            <h2>Ask your opponent a yes-or-no question.</h2>
            <p>
              They answer out loud. Tap every person who no longer matches,
              then end your turn or make a guess.
            </p>
          </div>'''
          new2 = '''          <div>
            <span className={styles.eyebrow}>PLAYER {currentPlayer}</span>
            <h2>Ask your opponent a yes-or-no question.</h2>
            <p>
              They answer out loud. Tap every person who no longer matches,
              then end your turn or make a guess.
            </p>
            <button
              type="button"
              className={styles.guessNowButton}
              onClick={() => setGuessOpen(true)}
            >
              🎯 Make a guess
            </button>
          </div>'''
          if text.count('className={styles.guessNowButton}') < 2:
              text = text.replace(old2, new2, 1)
          page.write_text(text)

          css = Path('adrianos-play-starter/app/games/guess-who/guess-who.module.css')
          styles = css.read_text()
          if '.guessNowButton {' not in styles:
              marker = '''.primaryButton {
  border: 0;
  color: #10131b;
  background: #d9ff5b;
}
'''
              styles = styles.replace(marker, marker + '''
.guessNowButton {
  width: 100%;
  min-height: 54px;
  margin-top: 12px;
  padding: 14px 18px;
  border: 0;
  border-radius: 18px;
  color: #10131b;
  background: #d9ff5b;
  font-size: 1.05rem;
  font-weight: 950;
  cursor: pointer;
}
''', 1)
          styles = styles.replace('  bottom: 14px;\n  display: flex;', '  bottom: 108px;\n  display: flex;', 1)
          css.write_text(styles)
          PY
      - name: Commit patch
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/app/games/guess-who/GuessWhoGame.tsx adrianos-play-starter/app/games/guess-who/guess-who.module.css
          git commit -m "Fix Guess Who controls in School Mode"
          git push origin HEAD:fix/guess-who-school-mode
