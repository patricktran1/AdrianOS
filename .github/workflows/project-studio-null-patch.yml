name: Project Studio Nullability Patch

on:
  push:
    branches: [feature/project-studio]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message != 'Narrow Project Studio handler state'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/project-studio
      - name: Narrow validated page state
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('adrianos-play-starter/app/projects/page.tsx')
          text = path.read_text()
          marker = '  function selectProject(next: ProjectWork) {'
          replacement = '  const currentProject = project;\n  const currentTemplate = template;\n\n  function selectProject(next: ProjectWork) {'
          text = text.replace(marker, replacement, 1)
          text = text.replace('template.discover.answer', 'currentTemplate.discover.answer')
          text = text.replace('project.id', 'currentProject.id')
          text = text.replace('projectName.trim() || template.title', 'projectName.trim() || currentTemplate.title')
          path.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name "AdrianOS Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add adrianos-play-starter/app/projects/page.tsx
          if ! git diff --cached --quiet; then
            git commit -m "Narrow Project Studio handler state"
            git push origin HEAD:feature/project-studio
          fi
